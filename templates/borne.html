<!DOCTYPE html>
<html>
<head>
    <title>Borne Pilate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .card-borne { width: 100%; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card card-borne shadow-lg bg-white">
            <h2 class="mb-4 text-primary">Bonjour !</h2>
            <p class="text-muted">Entrez vos informations pour valider votre séance</p>
            
            {% if erreur %}
                <div class="alert alert-danger">{{ erreur }}</div>
            {% endif %}

            <form action="/borne" method="POST">
                <div class="mb-3">
                    <input type="text" name="prenom" class="form-control form-control-lg text-center" placeholder="Prénom" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="nom" class="form-control form-control-lg text-center" placeholder="Nom" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold">VALIDER MA PRÉSENCE</button>
            </form>
        </div>
    </div>
</body>
</html>
