<!DOCTYPE html>
<html>
<head>
    <title>Borne Pilate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .card-borne { width: 100%; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card card-borne shadow-lg bg-white">
            <div class="mb-4">
                <i class="fas fa-user-check text-primary display-4"></i>
            </div>
            <h2 class="mb-4 text-primary">Bonjour !</h2>
            <p class="text-muted">Entrez vos informations pour valider votre séance</p>
            
            {% if erreur %}
                <div class="alert alert-danger">{{ erreur }}</div>
            {% endif %}

            <form action="/borne" method="POST">
                <div class="mb-3">
                    <input type="text" name="prenom" class="form-control form-control-lg text-center" placeholder="Prénom" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="nom" class="form-control form-control-lg text-center" placeholder="Nom" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold">VALIDER MA PRÉSENCE</button>
            </form>
        </div>
    </div>

    {% if id_cookie %}
    <div class="modal fade" id="modalReconnaissance" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body text-center p-5">
                    <!-- <div class="mb-3">
                        <span class="display-1 text-primary">👋</span>
                    </div> -->
                    <h2 class="fw-bold">Ravi de vous revoir !</h2>
                    <p class="fs-4 text-secondary">Est-ce bien vous, <br><strong>{{ prenom_cookie }} {{ nom_cookie }}</strong> ?</p>
                    
                    <div class="d-grid gap-3 mt-4">
                        <form action="/borne" method="POST">
                            <input type="hidden" name="client_id" value="{{ id_cookie }}">
                            <button type="submit" class="btn btn-success btn-lg w-100 py-3 fw-bold shadow-sm">
                                <i class="fas fa-check-circle me-2"></i> OUI, C'EST MOI
                            </button>
                        </form>
                        
                        <button type="button" class="btn btn-outline-warning btn-lg border-0" data-bs-dismiss="modal">
                            Non, ce n'est pas moi
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endif %}

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Si les données du cookie sont présentes (passées par Flask), on ouvre la modale
            {% if id_cookie %}
                var myModal = new bootstrap.Modal(document.getElementById('modalReconnaissance'));
                myModal.show();
            {% endif %}
        });
    </script>

</body>
</html>
