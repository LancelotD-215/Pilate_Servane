{% extends 'layout.html' %}

{% block content %}


<div class="row justify-content-center"> <!-- Ligne Bootstrap pour aligner les colonnes au centre -->
    <div class="col-md-12"> <!-- Colonne de taille moyenne (8/12), md pour medium sur les écrans moyens -->
        <div class="card shadow-sm"> <!-- Carte Bootstrap (zone encadrée), et ombre légère (sm pour small) -->
            <div class="card-header bg-white"> <!-- En-tête de la carte avec fond blanc -->
                <h4 class="mb-0">Liste des clients</h4>
            </div>
            <div class="card-body p-0"> <!-- Corps de la carte avec padding nul -->
                <table id="tableauClients" class="table table-striped mb-0"> <!-- Table Bootstrap avec lignes alternées (striped) et marge basse nulle -->
                    <thead>
                        <tr>
                            <th class="w-25">Prénom</th>
                            <th class="w-25">Nom</th>
                            <th class="text-center w-45">Séances restantes</th>
                            <th class="text-center w-5">Infos</th>
                            <th class="text-center w-5">Ajout</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for client in clients %} <!-- Coeur dynamique : boucle sur la liste des clients passée depuis le backend -->
                        <tr> <!-- Ligne du tableau pour chaque client, table row -->
                            <td>{{ client['prenom'] }}</td> <!-- Cellule du tableau pour le prénom, table data -->
                            <td>{{ client['nom'] }}</td> <!-- Double accolade pour insérer la valeur dynamique du nom -->
                            <td class="text-center" data-order="{{ client['seances_restantes'] }}"> <!-- Centre le texte de cette cellule -->
                                <span class="badge rounded-pill 
                                    {% if client['seances_restantes'] > 0 %}
                                        bg-success
                                    {% elif client['seances_restantes'] == 0 %}
                                        bg-warning
                                    {% else %}
                                        bg-danger
                                    {% endif %}">
                                    {{ client['seances_restantes'] }}
                                </span>
                            </td>
                            <td class="text-center">
                                <button type="button" class="btn btn-sm btn-outline-info rounded-pill btn-voir-fiche"
                                        data-client-id="{{ client['id'] }}">
                                    <i class="fas fa-info-circle"></i>
                                </button>
                            </td>
                            <td class="text-center">
                                <button type="button" class="btn btn-sm btn-outline-primary rounded-pill btn-ajout-rapide"
                                data-id="{{ client['id'] }}"
                                data-prenom="{{ client['prenom'] }}"
                                data-nom="{{ client['nom'] }}">
                                    <i class="fas fa-plus-circle"></i>
                                </button>
                           </td>
                        </tr>
                        {% endfor %} <!-- Fin de la boucle sur les clients -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAjoutSeance" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form action="/ajout_seances_rapide" method="POST">
          
        <div class="modal-header bg-light">
          <h5 class="modal-title">Ajouter des séances</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        
        <div class="modal-body">
            <div class="mb-4 text-center">
                    <p class="text-center">Ajout de séances pour :</p>
                    <h3 id="modalClientNom" class="text-pink-logo fw-bold mb-0"></h3>
            </div>
          
          <input type="hidden" name="client_id" id="inputClientId">

          <hr>

          <div class="mb-3">
            <label class="form-label">Nombre de séances à ajouter</label>
            <input type="number" class="form-control form-control-lg text-center" name="seances_ajoutees" value="5" min="1" required>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button type="submit" class="btn btn-success">Valider</button>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
    // On attend que le document soit chargé
    // Note: Assure-toi que jQuery est bien chargé dans layout.html AVANT ce bloc
    document.addEventListener("DOMContentLoaded", function() {
        
        // On utilise jQuery avec "delegation" pour gérer DataTables
        // Au lieu de dire "Sur le bouton", on dit "Sur le Document, surveille les clics qui viennent de .btn-ajout-rapide"
        $(document).on('click', '.btn-ajout-rapide', function () {
            
            // 1. On récupère les infos
            var id = $(this).data('id');
            var prenom = $(this).data('prenom');
            var nom = $(this).data('nom');

            // 2. On remplit la modale
            $('#inputClientId').val(id);
            $('#modalClientNom').text(prenom + ' ' + nom);

            // 3. On affiche la modale Bootstrap
            var myModal = new bootstrap.Modal(document.getElementById('modalAjoutSeance'));
            myModal.show();
        });
        
        // Gestion du clic sur le bouton Info
        $(document).on('click', '.btn-voir-fiche', function() {
            var clientId = $(this).data('client-id');
            window.location.href = '/client/' + clientId;
        });
    });
</script>

{% endblock %}
