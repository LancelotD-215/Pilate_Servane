<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Succès</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #1ecc6120; 
            display: flex; 
            align-items: center; 
            height: 100vh; 
            padding: 1rem;
        }
        h1 {
            font-size: 2.5rem;
        }
        .fs-mobile {
            font-size: 1.5rem !important;
        }

        .alert-blue {
            background-color: #2684851e;
            border-color: #268385;
            color: #268385;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 3.5rem;
            }
            .fs-mobile {
                font-size: 1.25rem !important;
            }
        }
    </style>
</head>
<body class="text-center">
    <div class="container">
        <!-- <div class="display-1 text-success mb-4">✅</div> -->
        <h1 class="fw-bold">Présence validée !</h1>
        <p class="fs-mobile">Merci {{ prenom }}, bonne séance !</p>
        <div class="alert alert-blue d-inline-block mt-3 px-3 px-md-5">
            Il vous reste <strong>{{ solde }}</strong> séances.
        </div>
    </div>
</body>
</html>
