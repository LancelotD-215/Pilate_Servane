<!DOCTYPE html>
<html lang="fr"> <!-- Corps du html, fr pour le référencement en français -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Pour le responsive design (adaptation aux différentes tailles d'écran) -->
    <title>Gestion Studio S</title> <!-- Titre de la page -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Lien vers le CSS de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> <!-- Lien vers ton propre CSS pour les styles personnalisés -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='studioSfavicon.png') }}"> <!-- Favicon pour l'onglet du navigateur -->
    <style>
        /* Masquer la croix native des inputs search pour éviter la duplication avec la croix Bootstrap */
        input[type="search"]::-webkit-search-cancel-button {
            display: none;
        }
        input[type="search"]::-webkit-search-decoration {
            display: none;
        }
    </style>
</head>
<body class="bg-lightgrey-background"> <!-- Class Bootstrap pour un fond clair -->

    <nav class="navbar navbar-expand-lg navbar-light bg-grey-background mb-2 shadow"> <!-- Barre de navigation avec class Bootstrap : fond bleu, texte blanc, marge de 4, ombre -->
        <div class="container-fluid px-3 d-flex align-items-center"> <!-- Conteneur Bootstrap pour centrer le contenu avec padding horizontal de 3 -->
            
            <!-- GAUCHE : Logo + Menu -->
            <div class="d-flex align-items-center flex-shrink-0">
                <!-- MOBILE : Bouton hamburger (masqué sur desktop) -->
                <button class="navbar-toggler me-2 d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
                    <img src="{{ url_for('static', filename='logo-studio-s-pilates-1x.png') }}" 
                        alt="Logo StudioS" 
                        height="40" 
                        class="d-inline-block align-text-top">
                    <!-- <span class="ms-2 fw-bold text-pink-logo">Gestion Pilate</span> -->
                </a>                
                <!-- DESKTOP : Menu horizontal (masqué sur mobile) -->
                <ul class="navbar-nav d-none d-lg-flex">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('planning') }}">Planning</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/gestion_clients">Gestion Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ajout_seances">Ajout séances</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ajout_client">Nouveau Client</a>
                    </li>
                </ul>
            </div>
            
            <!-- MOBILE : Check-in seulement (fixe à droite) -->
            <a class="btn btn-pink-logo d-lg-none ms-auto" href="/presence">Check-in</a>
            
            <!-- MOBILE : Menu de navigation collapsible -->
            <div class="collapse navbar-collapse" id="navbarNav">
                
                <!-- Barre de recherche mobile (visible uniquement sur petit écran) -->
                <form class="d-flex d-lg-none mt-3 mb-2 position-relative" action="/recherche_client" method="GET">
                    <input class="form-control pe-4" type="search" name="q" placeholder="Prénom Nom" aria-label="Rechercher" required id="searchMobile">
                    <button type="button" class="btn-close btn-sm position-absolute top-50 end-0 translate-middle-y me-2" style="filter: invert(0.5);" onclick="document.getElementById('searchMobile').value=''; document.getElementById('searchMobile').focus();"></button>
                </form>
                
                <!-- Navigation mobile seulement (masquée sur desktop) -->
                <ul class="navbar-nav text-start d-lg-none">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('planning') }}">Planning</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/gestion_clients">Gestion Clients</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/ajout_seances">Ajout séances</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/ajout_client">Nouveau Client</a>
                    </li>
                </ul>
            </div>
            
            <!--DROITE : Check-in et recherche-->
            <div class="d-none d-lg-flex align-items-center ms-auto">
                <form class="d-flex me-3 position-relative" action="/recherche_client" method="GET">
                    <input class="form-control pe-4" type="search" name="q" placeholder="Prénom Nom" aria-label="Rechercher" required id="searchDesktop">
                    <button type="button" class="btn-close btn-sm position-absolute top-50 end-0 translate-middle-y me-2" style="filter: invert(0.5);" onclick="document.getElementById('searchDesktop').value=''; document.getElementById('searchDesktop').focus();"></button>
                </form>
                
                <a class="btn btn-pink-logo" href="/presence">Check-in</a>
            </div>
            
        </div>
        
    </nav>

    <div class="container-fluid px-5">
        {% block content %}{% endblock %} <!-- Bloc de contenu qui sera remplacé par le contenu spécifique de chaque page -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> <!-- Lien vers le JS de Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#tableauClients').DataTable({
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/fr-FR.json'
                },
                // --- PERSONNALISATION (Change true par false pour tester) ---

                // Enlever le choix "Afficher 10/25/50 éléments" ?
                lengthChange: false,  // false = Cache le menu déroulant "Afficher X entrées"

                // Choisir combien de lignes s'affichent par défaut (ex: 5 au lieu de 10)
                pageLength: 5, 

                // Enlever la barre de recherche ?
                searching: true,     // false = Cache la barre "Rechercher"

                // Enlever la pagination (Page 1, 2, Suivant) ?
                paging: false,        // false = Affiche TOUT le tableau sur une seule page

                // Enlever le petit texte "Affichage de 1 à 5 sur 12 entrées" ?
                info: false,          // false = Cache le résumé en bas à gauche

                // Enlever le tri automatique au chargement (pour garder ton ordre SQL) ?
                ordering: true       // false = Désactive les flèches de tri
            });
        });
    </script>
</body>
</html>
